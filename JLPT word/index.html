<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>일본어 단어 카드</title>
    </head>
    <body>
        <h1>일본어 단어 카드</h1>

        <input id="word-input" placeholder="단어를 입력하세요" />
        <button id="word-button">추가</button>

        <input id="search-input" placeholder="찾을 단어를 입력하세요" />
        <button id="search-button">검색</button>

        <ul></ul>

        <script>
            // localStorage에 저장된 단어가 없을 때 처음 보여줄 기본 단어 목록
            // 단어 하나는 문자열이 아니라 { text, memorized } 형태의 객체로 관리한다.
            const defaultWords = [
                { text: "勉強(べんきょう) - 공부", memorized: false },
                { text: "言葉(ことば) - 단어, 말", memorized: false },
            ];

            // 화면에서 필요한 요소들을 id 또는 태그 이름으로 찾는다.
            const wordList = document.querySelector("ul");
            const wordInput = document.querySelector("#word-input");
            const wordButton = document.querySelector("#word-button");
            const searchInput = document.querySelector("#search-input");
            const searchButton = document.querySelector("#search-button");

            // 단어 카드에 외움/미외움 버튼을 붙이는 함수
            function addMemorizedButton(card, wordData) {
                const memorizedButton = document.createElement("button");
                memorizedButton.className = "memorized-button";

                if (wordData.memorized) {
                    memorizedButton.textContent = "외움";
                } else {
                    memorizedButton.textContent = "미외움";
                }

                memorizedButton.addEventListener("click", function () {
                    wordData.memorized = !wordData.memorized;

                    if (wordData.memorized) {
                        memorizedButton.textContent = "외움";
                    } else {
                        memorizedButton.textContent = "미외움";
                    }

                    saveWords();
                });

                card.appendChild(memorizedButton);
            }

            // 단어 카드에 수정 버튼을 붙이는 함수
            function addEditButton(card) {
                const editButton = document.createElement("button");
                editButton.textContent = "수정";

                editButton.addEventListener("click", function () {
                    const wordSpan = card.querySelector("span");
                    const currentWord = wordSpan.textContent;

                    const newWord = prompt("수정할 단어를 입력하세요", currentWord);

                    if (newWord === null) {
                        return;
                    }

                    if (newWord.trim() === "") {
                        alert("빈 값으로 수정할 수 없습니다");
                        return;
                    }

                    wordSpan.textContent = newWord.trim();

                    saveWords();
                });

                card.appendChild(editButton);
            }

            // 단어 카드에 삭제 버튼을 붙이는 함수
            function addDeleteButton(card) {
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "삭제";

                deleteButton.addEventListener("click", function () {
                    card.remove();

                    saveWords();
                });

                card.appendChild(deleteButton);
            }

            // 단어 객체 하나를 받아서 화면에 카드 li를 만드는 함수
            function createWordCard(wordData) {
                const card = document.createElement("li");

                const wordSpan = document.createElement("span");
                wordSpan.textContent = wordData.text;

                card.appendChild(wordSpan);

                addMemorizedButton(card, wordData);
                addEditButton(card);
                addDeleteButton(card);

                wordList.appendChild(card);
            }

            // 현재 화면에 있는 단어 카드들을 객체 배열로 만들어 localStorage에 저장한다.
            function saveWords() {
                const words = [];

                const cards = document.querySelectorAll("li");

                cards.forEach(function (card) {
                    const wordText = card.querySelector("span").textContent.trim();

                    const memorizedButton = card.querySelector(".memorized-button");
                    const isMemorized = memorizedButton.textContent === "외움";

                    words.push({
                        text: wordText,
                        memorized: isMemorized,
                    });
                });

                console.log(words);

                localStorage.setItem("words", JSON.stringify(words));
            }

            // localStorage는 문자열만 저장하므로 JSON.parse로 다시 객체 배열로 되돌린다.
            const savedWords = JSON.parse(localStorage.getItem("words"));

            // 저장된 단어가 있으면 savedWords를 사용하고, 없으면 defaultWords를 사용한다.
            const initialWords = savedWords || defaultWords;

            // 초기 단어 데이터를 기준으로 화면에 카드들을 만든다.
            initialWords.forEach(function (wordData) {
                createWordCard(wordData);
            });

            // 추가 버튼을 누르면 새 단어 객체를 만들고 화면과 localStorage에 반영한다.
            wordButton.addEventListener("click", function () {
                const wordText = wordInput.value.trim();

                if (wordText === "") {
                    alert("단어를 입력해주세요");
                    return;
                }

                const wordData = {
                    text: wordText,
                    memorized: false,
                };

                createWordCard(wordData);

                saveWords();

                wordInput.value = "";
            });

            // 검색 버튼을 누르면 단어 텍스트에 검색어가 포함된 카드만 보여준다.
            function searchWords() {
                const keyword = searchInput.value.trim();

                const cards = document.querySelectorAll("li");

                cards.forEach(function (card) {
                    const cardText = card.querySelector("span").textContent.trim();

                    if (cardText.includes(keyword)) {
                        card.style.display = "";
                    } else {
                        card.style.display = "none";
                    }
                });
            }

            searchButton.addEventListener("click", searchWords);
        </script>
    </body>
</html>
