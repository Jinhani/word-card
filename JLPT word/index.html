<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>일본어 단어 카드</title>
    </head>
    <body>
        <h1>일본어 단어 카드</h1>

        <input id="word-input" placeholder="단어를 입력하세요" />
        <button id="word-button">추가</button>
        <input id="search-input" placeholder="찾을 단어를 입력하세요" />
        <button id="search-button">검색</button>

        <ul>
            <li>
                <span>勉強(べんきょう) - 공부</span>
                <span>sp言葉(ことば) - 단어, 말</span>
            </li>
        </ul>

        <script>
            const wordList = document.querySelector("ul");
            const wordInput = document.querySelector("#word-input");
            const wordButton = document.querySelector("#word-button");
            const searchButton = document.querySelector("#search-button");
            const searchInput = document.querySelector("#search-input");

            function addEditButton(li) {
                const editButton = document.createElement("button");
                editButton.textContent = "수정";

                editButton.addEventListener("click", function () {
                    const span = li.querySelector("span");
                    const currentWord = span.textContent;

                    const newWord = prompt("수정할 단어를 입력하세요", currentWord);

                    if (newWord === null) {
                        return;
                    }

                    if (newWord.trim() === "") {
                        alert("빈 값으로 수정할 수 없습니다");
                        return;
                    }

                    span.textContent = newWord.trim();

                    saveWords();
                });

                li.appendChild(editButton);
            }

            // li 하나를 받아서 삭제 버튼을 붙여주는 함수

            function addDeleteButton(li) {
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "삭제";

                deleteButton.addEventListener("click", function () {
                    li.remove();
                    saveWords(); // 삭제 후 현재 목록을 다시 저장
                });

                li.appendChild(deleteButton);
            }

            // 단어 하나를 받아서 li를 만들고 화면에 추가하는 함수
            function createWordItem(word) {
                const li = document.createElement("li");

                const span = document.createElement("span");
                span.textContent = word;

                li.appendChild(span);

                addEditButton(li);
                addDeleteButton(li);

                wordList.appendChild(li);
            }

            // 현재 화면에 있는 li들의 단어만 모아서 localStorage에 저장하는 함수
            function saveWords() {
                const words = [];

                const items = document.querySelectorAll("li");

                items.forEach(function (li) {
                    // li 안에는 "단어 텍스트 + 삭제 버튼"이 같이 있음
                    // 그래서 첫 번째 자식 노드의 텍스트만 가져옴
                    const word = li.querySelector("span").textContent.trim();
                    words.push(word);
                });

                console.log(words);

                localStorage.setItem("words", JSON.stringify(words));
            }

            // localStorage에 저장된 단어들을 가져옴
            const savedWords = JSON.parse(localStorage.getItem("words"));

            if (savedWords) {
                // 저장된 단어가 있으면, 기존 ul 내용을 비움
                wordList.innerHTML = "";

                // 저장된 단어 배열을 기준으로 li를 다시 만듦
                savedWords.forEach(function (word) {
                    createWordItem(word);
                });
            } else {
                // 저장된 단어가 없으면, 기존 HTML에 있던 li들에 삭제 버튼만 붙임
                const existingWords = document.querySelectorAll("li");

                existingWords.forEach(function (li) {
                    addDeleteButton(li);
                });
            }

            wordButton.addEventListener("click", function () {
                const word = wordInput.value.trim();

                if (word === "") {
                    alert("단어를 입력해주세요");
                    return;
                }

                createWordItem(word);

                saveWords(); // 추가 후 현재 목록을 저장

                wordInput.value = "";
            });
            function searchWords() {
                const keyword = searchInput.value.trim();

                const items = document.querySelectorAll("li");

                items.forEach(function (li) {
                    const itemText = li.querySelector("span").textContent.trim();

                    if (itemText.includes(keyword)) {
                        li.style.display = "";
                    } else {
                        li.style.display = "none";
                    }
                });
            }

            // searchInput.addEventListener("input", function () {
            //     const keyword = searchInput.value.trim();

            //     const items = document.querySelectorAll("li");

            //     items.forEach(function (li) {
            //         const word = li.firstChild.textContent.trim();

            //         if (word.includes(keyword)) {
            //             li.style.display = "";
            //         } else {
            //             li.style.display = "none";
            //         }
            //     });
            // }); => 검색을 누르지 않아도 나오게 하는 검색방법

            searchButton.addEventListener("click", searchWords);
        </script>
    </body>
</html>

2. 중복되는 li 생성 로직 함수화
3. 검색 기능도 함수로 유지
4. 저장/불러오기 흐름 명확히 정리
5. 그다음 수정 기능 또는 React 전환 -->

<!-- 
li 안의 단어 텍스트와 버튼을 분리하기 위해 span을 사용했다(텍스트와 버튼이 섞이면 저장/검색/수정이 불안정해지기 때문에)
추가/수정 삭제 후 saveWord()를 호출해서 새로고침등을 해도 남아있을 수 있도록 로컬스토리지에 현재 목록을 저장했다
input과 button이 여러 개여서 id 선택자로 요소를 찾는것에 집중했다. -->
<!-- memorized는 메서드가 아니라 객체의 속성이다.
 단어 텍스트뿐 아니라 외움 상태까지 저장하려고 문자열 배열을 객체 배열로 바꾼다.
 예: { text: "勉強(べんきょう) - 공부", memorized: false } -->
